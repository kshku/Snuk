name: PR Check

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  clang-format:
    name: Code formatting
    runs-on: ubuntu-latest

    steps:
      - name: Install clang-format-19
        run: |
          sudo apt update
          sudo apt install -y clang-format-19

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check formatting
        run: |
          clang-format-19 --dry-run --Werror $(git ls-files '*.c' '*.h')

  build-check:
    name: Build check (warnings as errors)
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
 
      - name: Configure (strict)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror"
 
      - name: Build
        run: cmake --build build
