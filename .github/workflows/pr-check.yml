name: PR Check

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  build-check:
    name: Build check (warnings as errors)
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
 
      - name: Configure (strict)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror"
 
      - name: Build
        run: cmake --build build
