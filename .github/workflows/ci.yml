name: CI

on:
  push:
    branches:
      - dev

  pull_request:
    branches:
      - dev
      - main

  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            cc: gcc
            cmake_generator: "Unix Makefiles"
          - os: macos-latest
            cc: clang
            cmake_generator: "Unix Makefiles"
          - os: windows-latest
            cc: cl
            cmake_generator: "Visual Studio 17 2022"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          cmake -B build \
          -G "${{ matrix.cmake_generator }}" \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
        shell: bash

      - name: Build
        run: cmake --build build --config Debug

      - name: Run unit tests
        run: ctest --test-dir build/tests -L unit --output-on-failure -C Debug
        shell: bash

      - name: Run .snuk files
        run: ctest --test-dir build/tests -L snuk_files --output-on-failure -C Debug
        shell: bash
